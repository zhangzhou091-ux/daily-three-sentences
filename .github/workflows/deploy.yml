# 工作流名称
name: Deploy to GitHub Pages

# 触发条件：推送到 main 分支时自动运行
on:
  push:
    branches: [ main ]

# 工作流任务
jobs:
  deploy:
    # 运行环境
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js（使用兼容的 Node 版本）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # 3. 安装项目依赖
      - name: Install dependencies
        run: npm install

      # 4. 构建生产版本 - 直接从 GitHub Secrets 注入环境变量
      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "检查环境变量注入:"
          echo "VITE_SUPABASE_URL 长度: ${#VITE_SUPABASE_URL}"
          echo "VITE_SUPABASE_ANON_KEY 长度: ${#VITE_SUPABASE_ANON_KEY}"
          npm run build

      # 5. 部署到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist